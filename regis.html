<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="main-container">
        <div class="form-side">
            <div class="header">
                <h1>Register</h1>
            </div>

            <form class="form-container" onsubmit="event.preventDefault(); window.location.href='index.html';">
                
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" placeholder="Enter your Name" required>
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your Email" required>
                </div>

                <div class="input-group">
                    <label>Address</label>
                    <input type="text" placeholder="Enter your Address" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <i class="fa-solid fa-lock prefix-icon"></i>
                        <input type="password" placeholder="Password" required>
                        <i class="fa-solid fa-eye-slash suffix-icon"></i>
                    </div>
                </div>

                <button type="submit" class="save-btn">Register</button>
            </form>

            <div class="footer-link">
                Sudah punya akun? <a href="index.html">Login di sini</a>
            </div>
        </div>
    </div>

</body>
</html>
