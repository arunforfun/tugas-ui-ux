<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Ngobrol.in</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <h1 class="app-brand">Ngobrol.in</h1>
        <h2 class="title">Buat Akun Baru</h2>
        <p class="subtitle">Mari bergabung dan mulai diskusi seru hari ini!</p>
      </div>

      <form onsubmit="event.preventDefault(); window.location.href='index.html';">
        
        <div class="form-group">
          <label>Nama Lengkap</label>
          <div class="input-container">
            <i class="fa-regular fa-user input-icon"></i>
            <input type="text" placeholder="Masukkan nama kamu" required>
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <div class="input-container">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input type="email" placeholder="Masukkan email kamu" required>
          </div>
        </div>

        <div class="form-group">
          <label>Alamat Asal</label>
          <div class="input-container">
            <i class="fa-solid fa-map-location-dot input-icon"></i>
            <input type="text" placeholder="Masukkan alamat kamu" required>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-container">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" class="has-suffix" placeholder="Buat password yang kuat" required>
            <i class="fa-regular fa-eye-slash suffix-icon"></i>
          </div>
        </div>

        <button type="submit" class="btn-auth">Daftar Sekarang</button>

      </form>

      <div class="auth-footer">
        <p>Sudah punya akun? <a href="index.html">Login di sini</a></p>
      </div>

    </div>
  </div>

</body>
</html>
