<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Ngobrol.in</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-header">
        <h1 class="app-brand">Ngobrol.in</h1>
        <h2 class="title">Selamat Datang!</h2>
        <p class="subtitle">Harap login dulu sebelum memulai diskusi.</p>
      </div>

      <form onsubmit="event.preventDefault(); window.location.href='irenerv.html';">

        <div class="form-group">
          <label>Email</label>
          <div class="input-container">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input type="email" placeholder="Masukkan email kamu" required>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-container">
            <i class="fa-solid fa-lock input-icon"></i>
            <input type="password" class="has-suffix" placeholder="Masukkan password" required>
            <i class="fa-regular fa-eye-slash suffix-icon"></i>
          </div>
        </div>

        <button type="submit" class="btn-auth">Login Sekarang</button>

      </form>

      <div class="auth-footer">
        <p>Belum punya akun? <a href="regis.html">Daftar di sini</a></p>
        
      </div>

    </div>
  </div>

</body>
</html>
